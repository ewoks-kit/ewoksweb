name: Lint & Test

on:
  workflow_dispatch:
  pull_request: # for PRs from forks
  push:

permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest
    # Skip `pull_request` runs on local PRs for which `push` runs are already triggered
    if: github.event_name == 'push' || github.event.pull_request.head.repo.fork

    steps:
      - name: Checkout 🏷️
        uses: actions/checkout@v6

      - name: Set up Node 🕹️
        uses: actions/setup-node@v6
        with:
          node-version-file: 'package.json'

      - name: Install pnpm ⚙️
        uses: pnpm/action-setup@v5
        with:
          version: 9

      - name: Restore cache 📌
        uses: actions/cache@v5
        with:
          path: |
            ~/setup-pnpm/node_modules/.bin/store
            ~/.cache/Cypress
          key: cache-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: ${{ runner.os }}-

      - name: Install dependencies ⚙️
        run: pnpm install

      - name: Lint 🤓
        run: pnpm lint

  test:
    runs-on: ubuntu-latest
    # Skip `pull_request` runs on local PRs for which `push` runs are already triggered
    if: github.event_name == 'push' || github.event.pull_request.head.repo.fork

    steps:
      - name: Checkout 🏷️
        uses: actions/checkout@v6

      - name: Set up Node 🕹️
        uses: actions/setup-node@v6
        with:
          node-version-file: 'package.json'

      - name: Install pnpm ⚙️
        uses: pnpm/action-setup@v5
        with:
          version: 9

      - name: Restore cache 📌
        uses: actions/cache@v5
        with:
          path: |
            ~/setup-pnpm/node_modules/.bin/store
            ~/.cache/Cypress
          key: cache-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: ${{ runner.os }}-

      - name: Install dependencies ⚙️
        run: pnpm install

      - name: Build 📦
        run: pnpm build

      - name: Set up Python 🕹️
        id: setup-python
        uses: actions/setup-python@v6
        with:
          python-version-file: '.python-version'

      - name: Install API server ⚙️
        run: |
          python --version
          python -m pip install --upgrade pip setuptools
          python -m pip install -e .

      - name: Start API server ⚡️
        run: ewoksweb --config ./pysrc/ewoksweb/tests/resources/config.py --port=8000 > api.log 2>&1 & pnpm wait-on http://127.0.0.1:8000 -t 1m

      - name: Start Vite preview ⚡️
        run: pnpm preview --host 127.0.0.1 --port=3000 > preview.log 2>&1 & pnpm wait-on http://127.0.0.1:3000 -t 1m

      - name: Show logs
        run: |
          cat api.log
          cat preview.log

      - name: Run end-to-end tests
        run: pnpm cypress:run
