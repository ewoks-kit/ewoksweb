name: Test

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout 🏷️
        uses: actions/checkout@v6

      - name: Install
        uses: ./.github/actions/install

      - name: Lint 🤓
        run: pnpm lint

  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout 🏷️
        uses: actions/checkout@v6

      - name: Install
        uses: ./.github/actions/install

      - name: Build 📦
        run: pnpm build

      - name: Set up Python 🕹️
        id: setup-python
        uses: actions/setup-python@v6
        with:
          python-version-file: '.python-version'

      - name: Install API server ⚙️
        run: |
          python --version
          python -m pip install --upgrade pip setuptools
          python -m pip install -e .

      - name: Start API server ⚡️
        run: ewoksweb --config ./pysrc/ewoksweb/tests/resources/config.py --port=8000 > api.log 2>&1 & pnpm wait-on http://127.0.0.1:8000 -t 1m

      - name: Start Vite preview ⚡️
        run: pnpm preview --host 127.0.0.1 --port=3000 > preview.log 2>&1 & pnpm wait-on http://127.0.0.1:3000 -t 1m

      - name: Show logs
        run: |
          cat api.log
          cat preview.log

      - name: Run end-to-end tests
        run: pnpm cypress:run
