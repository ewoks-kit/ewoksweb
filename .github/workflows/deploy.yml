name: Deploy

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
      - name: Checkout 🏷️
        uses: actions/checkout@v6

      - name: Install
        uses: ./.github/actions/install

      - name: Build 📦
        run: pnpm build --base=/ewoksweb/
        env:
          VITE_SERVER_URL: https://bosquet.silx.org
          VITE_SERVER_API_SUFFIX: /ewoks/api
          VITE_ROUTER_BASE_DIR: /ewoksweb/

      - name: Upload artifacts
        uses: actions/upload-pages-artifact@v4
        with:
          path: 'build'

  deploy:
    needs: build
    runs-on: ubuntu-latest

    permissions:
      pages: write
      id-token: write

    steps:
      - name: Deploy 🚀
        id: deployment
        uses: actions/deploy-pages@v4

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
