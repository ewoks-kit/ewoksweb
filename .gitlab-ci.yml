stages:
  - style
  - build
  - test
  - deploy

variables:
  CYPRESS_CACHE_FOLDER: '$CI_PROJECT_DIR/.cypress-cache/'

### Jobs templates ###

.base:
  image: "docker-registry.esrf.fr/dau/ewoks:python_3.9_node_16"
  tags:
    - linux
  only:
    refs:
      - main
      - merge_requests
  timeout: 10m

.pnpm-base:
  extends: .base
  before_script:
    - curl -f https://get.pnpm.io/v6.16.js | node - add --global pnpm@7
    - pnpm config set store-dir .pnpm-store
    - pnpm install
  cache:
    key:
      files:
        - pnpm-lock.yaml
    paths:
      - .pnpm-store
      - .cypress-cache

.style:
  stage: style
  extends: .base

.build:
  stage: build
  extends: .pnpm-base
  only:
    refs:
      - main

.deploy:
  stage: deploy
  extends: .base
  only:
    refs:
      - main

### Required jobs ###

flake8:
  extends: .style
  before_script:
    - python3 -m pip install flake8
  script:
    - flake8

black:
  extends: .style
  before_script:
    - python3 -m pip install black
  script:
    - LC_ALL=C.UTF-8 black --check --safe .

lint:
  stage: style
  extends: .pnpm-base
  script:
    - pnpm run lint

cypress:
  image: cypress/base:16.18.0
  stage: test
  extends: .pnpm-base
  before_script:
    # https://github.com/cypress-io/cypress-docker-images/issues/642 and https://github.com/cypress-io/cypress-docker-images/issues/649
    - apt-get update && apt-get install curl -y
    - !reference [.pnpm-base, before_script]
  script:
    - pnpm build
    - pnpm dlx serve -s build -l 3000 & pnpm dlx wait-on http://localhost:3000
    - pnpm cypress:run


build:
  extends: .build
  script:
    - python3 --version
    - python3 -m pip install --upgrade pip
    - python3 -m pip install --upgrade setuptools
    - pnpm build
    - python3 setup.py sdist
    - mv dist sdist
  after_script:
    - ls -Rl sdist
  artifacts:
    paths:
      - sdist/
    when: on_success
    expire_in: 2h

pages:
  stage: deploy
  extends: .pnpm-base
  script:
    - pnpm build
    - rm -rf public
    - mv build public
  variables:
    REACT_APP_SERVER_URL: https://bosquet.silx.org/ewoks/
  artifacts:
    paths:
      - public
  only:
    - main

assets:
  extends: .deploy
  script:
    - rm -rf assets
    - mkdir assets
    - mv sdist/* assets/
  after_script:
    - ls -Rl assets
  artifacts:
    paths:
      - assets
    when: on_success
    expire_in: 2h
